spring.config.import=optional:file:../.env[.properties]
spring.application.name=Symptosis AI Backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/symptosis}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.serialization.write-dates-as-timestamps=false

app.ml.api-url=${ML_API_URL:http://localhost:5000/predict}
app.ml.timeout=${ML_TIMEOUT:3000}
app.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
app.ollama.model=${OLLAMA_MODEL:llama3}
app.ollama.timeout=${OLLAMA_TIMEOUT:5000}
app.weights.severity=${WEIGHT_SEVERITY:0.5}
app.weights.frequency=${WEIGHT_FREQUENCY:0.3}
app.weights.duration=${WEIGHT_DURATION:0.2}
app.features.enable-ml=${ENABLE_ML:true}
app.features.enable-llm=${ENABLE_LLM:true}
app.features.enable-logging=${ENABLE_LOGGING:true}
